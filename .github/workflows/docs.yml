name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MKDOCS_IMAGE: squidfunk/mkdocs-material:9.7.6

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Build site
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/docs" \
            "${MKDOCS_IMAGE}" \
            build --clean --site-dir .tmp-docs-public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4.0.0
        with:
          path: .tmp-docs-public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
